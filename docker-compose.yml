services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks
      MYSQL_USER: task
      MYSQL_PASSWORD: task
    ports: ["3306:3306"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  app:
    build: .
    depends_on: [mysql, redis]
    ports: ["8080:8080"]
    environment:
      MYSQL_DSN: task:task@tcp(mysql:3306)/tasks?parseTime=true&multiStatements=true
      REDIS_ADDR: redis:6379
