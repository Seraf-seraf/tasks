services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks
      MYSQL_USER: task
      MYSQL_PASSWORD: task
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u task -ptask --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7
    ports: ["6379:6379"]
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8080:8080"]
    environment:
      MYSQL_DSN: task:task@tcp(mysql:3306)/tasks?parseTime=true&multiStatements=true
      REDIS_ADDR: redis:6379
